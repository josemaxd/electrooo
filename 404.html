<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Página no encontrada | ELECTROMEC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:   rgb(0, 54, 68);
            --primary-d: rgb(0, 35, 45);
            --cyan:      #00bcd4;
            --orange:    #ff5a1f;
            --dark:      #0a1a20;
            --gray:      #607080;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { font-family:'Barlow', sans-serif; background:var(--dark); color:white; min-height:100vh; display:flex; flex-direction:column; }
        a { text-decoration:none; color:inherit; }

        /* HEADER */
        .header { background:var(--primary); padding:0 40px; display:flex; align-items:center; height:70px; }
        .logo-text { font-family:'Barlow Condensed', sans-serif; font-size:1.5rem; font-weight:900; color:white; letter-spacing:.08em; }
        .logo-text span { color:var(--cyan); }

        /* MAIN */
        .main {
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding:60px 20px;
            position:relative;
            overflow:hidden;
        }
        .bg-grid {
            position:absolute;
            inset:0;
            background-image:
                repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 1px, transparent 1px, transparent 60px),
                repeating-linear-gradient(0deg,  rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 1px, transparent 1px, transparent 60px);
        }
        .content { position:relative; z-index:1; max-width:560px; }
        .code {
            font-family:'Barlow Condensed', sans-serif;
            font-size:clamp(6rem, 22vw, 12rem);
            font-weight:900;
            line-height:1;
            letter-spacing:.04em;
            background: linear-gradient(135deg, var(--cyan) 0%, rgba(0,188,212,.3) 100%);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            margin-bottom:8px;
        }
        .title {
            font-family:'Barlow Condensed', sans-serif;
            font-size:clamp(1.4rem, 4vw, 2rem);
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:.06em;
            color:white;
            margin-bottom:16px;
        }
        .desc {
            font-size:.97rem;
            color:rgba(255,255,255,.5);
            line-height:1.7;
            font-weight:300;
            margin-bottom:40px;
        }
        .btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
        .btn-home {
            background:var(--cyan);
            color:var(--primary-d);
            padding:14px 32px;
            border-radius:40px;
            font-weight:700;
            font-size:.88rem;
            letter-spacing:.08em;
            text-transform:uppercase;
            transition:background .3s, transform .2s;
        }
        .btn-home:hover { background:#00d4ef; transform:translateY(-2px); }
        .btn-wa {
            background:transparent;
            border:2px solid rgba(255,255,255,.2);
            color:rgba(255,255,255,.7);
            padding:14px 32px;
            border-radius:40px;
            font-weight:700;
            font-size:.88rem;
            letter-spacing:.08em;
            text-transform:uppercase;
            transition:border-color .3s, color .3s, transform .2s;
        }
        .btn-wa:hover { border-color:white; color:white; transform:translateY(-2px); }

        .nav-links-404 {
            margin-top:50px;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:8px;
        }
        .nav-links-404 a {
            font-size:.78rem;
            color:rgba(255,255,255,.35);
            letter-spacing:.1em;
            text-transform:uppercase;
            padding:6px 14px;
            border:1px solid rgba(255,255,255,.08);
            border-radius:20px;
            transition:color .25s, border-color .25s;
        }
        .nav-links-404 a:hover { color:var(--cyan); border-color:var(--cyan); }

        /* FOOTER */
        .footer-404 {
            text-align:center;
            padding:20px;
            font-size:.75rem;
            color:rgba(255,255,255,.2);
            border-top:1px solid rgba(255,255,255,.06);
        }
        /* ÍCONO */
        .icon-404 {
            font-size:3rem;
            margin-bottom:16px;
            display:block;
            animation: pulso 2.5s ease-in-out infinite;
        }
        @keyframes pulso {
            0%, 100% { transform:scale(1); }
            50% { transform:scale(1.08); }
        }

        @media (max-width:480px) {
            .header { padding:0 16px; }
            .btns { flex-direction:column; align-items:center; }
            .btn-home, .btn-wa { width:100%; max-width:280px; text-align:center; }
        }
    </style>
</head>
<body>

<header class="header">
    <a href="index.html" class="logo-text">ELECTRO<span>MEC</span></a>
</header>

<main class="main">
    <div class="bg-grid"></div>
    <div class="content">
        <span class="icon-404">⚡</span>
        <div class="code">404</div>
        <h1 class="title">Página no encontrada</h1>
        <p class="desc">
            Parece que este circuito está abierto.<br>
            La página que buscas no existe o fue movida.
        </p>
        <div class="btns">
            <a href="index.html" class="btn-home">Volver al inicio</a>
            <a href="https://wa.me/51971022550?text=Hola,%20necesito%20ayuda%20en%20su%20página%20web" target="_blank" class="btn-wa">Contactar por WhatsApp</a>
        </div>
        <nav class="nav-links-404">
            <a href="nosotros.html">Nosotros</a>
            <a href="servicios.html">Servicios</a>
            <a href="catalogo.html">Productos</a>
            <a href="titanlift.html">TitanLift</a>
        </nav>
    </div>
</main>

<footer class="footer-404">
    © 2026 ELECTROMEC – Tacna, Perú
</footer>

</body>
</html>
